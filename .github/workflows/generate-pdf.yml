name: Generate PDF on HTML Change

on:
  push:
    branches:
      - master
    paths:
      - 'index.html'
      - '.github/workflows/generate-pdf.yml'

permissions:
  contents: write

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Generate release tag & file name
        id: tag
        run: |
          tag=$(date +'%Y%m%d_%H%M%z')
          human_tag=$(date +'%Y/%m/%d %H:%M %Z')
          file_name="Ebrahim_Gomaa_Awad_CV.pdf"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "human_tag=$human_tag" >> "$GITHUB_OUTPUT"
          echo "file_name=$file_name" >> "$GITHUB_OUTPUT"

      - name: Generate PDF
        run: FILE_NAME="${{ steps.tag.outputs.file_name }}" node scripts/generate-pdf.js

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.tag.outputs.file_name }}
          tag_name: ebrahim-gomaa-awad-cv-${{ steps.tag.outputs.tag }}
          name: Ebrahim Gomaa Awad CV ${{ steps.tag.outputs.human_tag }}
          body: Auto-generated PDF from index.html at commit ${{ github.sha }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
